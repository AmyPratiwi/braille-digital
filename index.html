<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Touch - Belajar Braille Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mencegah scrolling dan pergeseran halaman agar stabil untuk tunanetra */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #FFFFFF;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none; /* Menonaktifkan gestur default browser */
        }
        
        .braille-dot {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #333;
            transition: background-color 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #222;
        }

        .braille-dot.active {
            background-color: #444; /* Warna dasar titik aktif */
            border-color: #555;
        }

        /* Highlight saat jari berada di atas titik aktif */
        .braille-dot.touching-active {
            background-color: #FFD700 !important;
            box-shadow: 0 0 30px #FFD700;
            transform: scale(1.1);
        }

        /* Animasi getaran visual */
        @keyframes visual-vibe {
            0% { transform: translate(0); }
            25% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            75% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .vibrate-visual {
            animation: visual-vibe 0.1s linear infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-6">

    <header class="text-center pt-4">
        <h1 class="text-3xl font-bold text-yellow-500 mb-1">Braille Touch</h1>
        <p class="text-gray-400 text-sm">Usap area grid untuk meraba pola</p>
    </header>

    <!-- Panel Informasi Huruf -->
    <div class="text-center">
        <div id="letter-display" class="text-9xl font-black text-white leading-none" aria-live="polite">A</div>
        <p id="status-msg" class="text-xl text-yellow-400 mt-2 font-medium h-8"></p>
    </div>

    <!-- Grid Braille 2x3 -->
    <div class="grid grid-cols-2 gap-8 bg-zinc-900 p-10 rounded-3xl shadow-2xl border-4 border-zinc-800" id="braille-grid">
        <div class="braille-dot" id="dot-1" data-dot="1"></div>
        <div class="braille-dot" id="dot-4" data-dot="4"></div>
        <div class="braille-dot" id="dot-2" data-dot="2"></div>
        <div class="braille-dot" id="dot-5" data-dot="5"></div>
        <div class="braille-dot" id="dot-3" data-dot="3"></div>
        <div class="braille-dot" id="dot-6" data-dot="6"></div>
    </div>

    <!-- Kontrol Navigasi -->
    <div class="flex gap-6 w-full max-w-md pb-8">
        <button id="prev-btn" class="flex-1 bg-zinc-800 hover:bg-zinc-700 text-white py-6 rounded-2xl font-bold text-xl border-2 border-zinc-600">
            Mundur
        </button>
        <button id="next-btn" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-black py-6 rounded-2xl font-bold text-xl">
            Lanjut
        </button>
    </div>

    <script>
        const brailleAlphabet = {
            'A': [1], 'B': [1, 2], 'C': [1, 4], 'D': [1, 4, 5], 'E': [1, 5],
            'F': [1, 2, 4], 'G': [1, 2, 4, 5], 'H': [1, 2, 5], 'I': [2, 4],
            'J': [2, 4, 5], 'K': [1, 3], 'L': [1, 2, 3], 'M': [1, 3, 4],
            'N': [1, 3, 4, 5], 'O': [1, 3, 5], 'P': [1, 2, 3, 4], 'Q': [1, 2, 3, 4, 5],
            'R': [1, 2, 3, 5], 'S': [2, 3, 4], 'T': [2, 3, 4, 5], 'U': [1, 3, 6],
            'V': [1, 2, 3, 6], 'W': [2, 4, 5, 6], 'X': [1, 3, 4, 6], 'Y': [1, 3, 4, 5, 6],
            'Z': [1, 3, 5, 6]
        };

        const alphabet = Object.keys(brailleAlphabet);
        let currentIndex = 0;
        let currentlyVibrating = false;

        const letterDisplay = document.getElementById('letter-display');
        const statusMsg = document.getElementById('status-msg');
        const dots = document.querySelectorAll('.braille-dot');
        const brailleGrid = document.getElementById('braille-grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function triggerVibration(duration = 100) {
            if ("vibrate" in navigator) {
                navigator.vibrate(duration);
            }
        }

        function updateBrailleDisplay() {
            const char = alphabet[currentIndex];
            const activeDots = brailleAlphabet[char];
            
            letterDisplay.innerText = char;
            statusMsg.innerText = `Huruf ${char}`;

            dots.forEach(dot => {
                const dotNumber = parseInt(dot.getAttribute('data-dot'));
                dot.classList.remove('touching-active', 'vibrate-visual');
                if (activeDots.includes(dotNumber)) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
            
            speakLetter(`Huruf ${char}`);
        }

        function speakLetter(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'id-ID';
                window.speechSynthesis.speak(msg);
            }
        }

        // Fungsi Inti: Deteksi usapan jari pada grid
        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const elementUnderFinger = document.elementFromPoint(touch.clientX, touch.clientY);

            dots.forEach(dot => {
                if (dot === elementUnderFinger) {
                    if (dot.classList.contains('active')) {
                        // Jika jari di atas titik aktif
                        if (!dot.classList.contains('touching-active')) {
                            dot.classList.add('touching-active', 'vibrate-visual');
                            triggerVibration(200);
                        }
                    } else {
                        // Jika jari di atas titik kosong
                        dot.classList.remove('touching-active', 'vibrate-visual');
                        // Berikan getaran halus sebagai pembatas
                        if (!currentlyVibrating) {
                            triggerVibration(10);
                            currentlyVibrating = true;
                            setTimeout(() => { currentlyVibrating = false; }, 50);
                        }
                    }
                } else {
                    dot.classList.remove('touching-active', 'vibrate-visual');
                }
            });
        }

        function handleTouchEnd() {
            dots.forEach(dot => {
                dot.classList.remove('touching-active', 'vibrate-visual');
            });
        }

        // Event listener untuk usapan (Touch Events)
        brailleGrid.addEventListener('touchstart', handleTouchMove, {passive: false});
        brailleGrid.addEventListener('touchmove', handleTouchMove, {passive: false});
        brailleGrid.addEventListener('touchend', handleTouchEnd);

        // Navigasi Tombol
        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % alphabet.length;
            updateBrailleDisplay();
            triggerVibration(50);
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + alphabet.length) % alphabet.length;
            updateBrailleDisplay();
            triggerVibration(50);
        });

        window.onload = () => {
            updateBrailleDisplay();
        };
    </script>
</body>
</html>
