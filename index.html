<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Braille Reader - Membaca Kalimat Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mencegah pergeseran layar demi kenyamanan jari pengguna */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #FFFFFF;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
        }
        
        .braille-dot {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #1a1a1a;
            transition: background-color 0.1s ease, transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #333;
        }

        .braille-dot.active {
            background-color: #222;
            border-color: #444;
        }

        /* Highlight saat jari meraba titik yang aktif */
        .braille-dot.touching-active {
            background-color: #FFD700 !important;
            box-shadow: 0 0 50px #FFD700;
            transform: scale(1.15);
        }

        @keyframes visual-vibe {
            0% { transform: translate(0); }
            25% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            75% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .vibrate-visual {
            animation: visual-vibe 0.1s linear infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-6">

    <!-- Area Header -->
    <header class="text-center w-full pt-4">
        <h1 class="text-2xl font-bold text-yellow-500 tracking-tighter uppercase">Mode Membaca</h1>
        <div class="h-1 w-full bg-zinc-800 mt-2 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-yellow-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </header>

    <!-- Fokus Kalimat yang Sedang Dibaca -->
    <div class="text-center w-full px-4">
        <div id="full-sentence" class="text-xl text-zinc-500 mb-4 font-medium italic">
            <!-- Kalimat lengkap akan tampil di sini dengan highlight pada kata aktif -->
        </div>
        <div id="letter-focus" class="text-[12rem] font-black text-white leading-none">A</div>
        <p id="word-info" class="text-2xl text-yellow-400 font-bold mt-4"></p>
    </div>

    <!-- Grid Braille 2x3 (Area Utama Interaksi) -->
    <div class="grid grid-cols-2 gap-8 bg-zinc-900 p-12 rounded-[3rem] shadow-2xl border-4 border-zinc-800" id="braille-grid">
        <div class="braille-dot" id="dot-1" data-dot="1"></div>
        <div class="braille-dot" id="dot-4" data-dot="4"></div>
        <div class="braille-dot" id="dot-2" data-dot="2"></div>
        <div class="braille-dot" id="dot-5" data-dot="5"></div>
        <div class="braille-dot" id="dot-3" data-dot="3"></div>
        <div class="braille-dot" id="dot-6" data-dot="6"></div>
    </div>

    <!-- Navigasi Sentuh Besar -->
    <div class="flex gap-4 w-full max-w-lg pb-10">
        <button id="prev-btn" class="flex-1 bg-zinc-800 active:bg-zinc-700 text-white py-8 rounded-3xl font-bold text-2xl border-2 border-zinc-700">
            Kiri
        </button>
        <button id="next-btn" class="flex-1 bg-yellow-500 active:bg-yellow-400 text-black py-8 rounded-3xl font-bold text-2xl">
            Kanan
        </button>
    </div>

    <script>
        // Mapping Braille Standar
        const brailleMap = {
            'A': [1], 'B': [1, 2], 'C': [1, 4], 'D': [1, 4, 5], 'E': [1, 5],
            'F': [1, 2, 4], 'G': [1, 2, 4, 5], 'H': [1, 2, 5], 'I': [2, 4],
            'J': [2, 4, 5], 'K': [1, 3], 'L': [1, 2, 3], 'M': [1, 3, 4],
            'N': [1, 3, 4, 5], 'O': [1, 3, 5], 'P': [1, 2, 3, 4], 'Q': [1, 2, 3, 4, 5],
            'R': [1, 2, 3, 5], 'S': [2, 3, 4], 'T': [2, 3, 4, 5], 'U': [1, 3, 6],
            'V': [1, 2, 3, 6], 'W': [2, 4, 5, 6], 'X': [1, 3, 4, 6], 'Y': [1, 3, 4, 5, 6],
            'Z': [1, 3, 5, 6], ' ': [], '.': [2, 5, 6], ',': [2], '?': [2, 3, 6]
        };

        // Kalimat yang akan dibaca
        const kalimatToRead = "IBU SEDANG MASAK DI DAPUR.";
        let charIndex = 0;
        let currentlyVibrating = false;

        const letterFocus = document.getElementById('letter-focus');
        const wordInfo = document.getElementById('word-info');
        const fullSentenceElem = document.getElementById('full-sentence');
        const progressBar = document.getElementById('progress-bar');
        const dots = document.querySelectorAll('.braille-dot');
        const brailleGrid = document.getElementById('braille-grid');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function triggerVibration(pattern) {
            if ("vibrate" in navigator) {
                navigator.vibrate(pattern);
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'id-ID';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        }

        function updateReader() {
            const char = kalimatToRead[charIndex].toUpperCase();
            const activeDots = brailleMap[char] || [];
            
            // Update Teks Visual
            letterFocus.innerText = char === ' ' ? '␣' : char;
            
            // Temukan kata yang sedang dibaca
            const words = kalimatToRead.split(' ');
            let cumulativeLength = 0;
            let currentWord = "";
            for(let w of words) {
                cumulativeLength += w.length + 1;
                if(charIndex < cumulativeLength) {
                    currentWord = w;
                    break;
                }
            }
            wordInfo.innerText = char === ' ' ? "(Spasi)" : `Kata: ${currentWord}`;

            // Update Progress
            const progress = ((charIndex + 1) / kalimatToRead.length) * 100;
            progressBar.style.width = `${progress}%`;

            // Update Dots
            dots.forEach(dot => {
                const dotNum = parseInt(dot.getAttribute('data-dot'));
                dot.classList.remove('touching-active', 'vibrate-visual');
                dot.classList.toggle('active', activeDots.includes(dotNum));
            });

            // Suara bantuan
            if (char === ' ') speak("Spasi");
            else if (char === '.') speak("Titik. Kalimat selesai.");
            else speak(char);
        }

        // Fungsi Rabaan Jari
        function handleScan(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);

            dots.forEach(dot => {
                if (dot === element) {
                    if (dot.classList.contains('active')) {
                        if (!dot.classList.contains('touching-active')) {
                            dot.classList.add('touching-active', 'vibrate-visual');
                            triggerVibration(150); // Getaran mantap untuk titik aktif
                        }
                    } else {
                        dot.classList.remove('touching-active', 'vibrate-visual');
                        // Getaran sangat tipis untuk menandai batas area rabaan
                        if (!currentlyVibrating) {
                            triggerVibration(10);
                            currentlyVibrating = true;
                            setTimeout(() => { currentlyVibrating = false; }, 80);
                        }
                    }
                } else {
                    dot.classList.remove('touching-active', 'vibrate-visual');
                }
            });
        }

        function endScan() {
            dots.forEach(dot => dot.classList.remove('touching-active', 'vibrate-visual'));
        }

        brailleGrid.addEventListener('touchstart', handleScan, {passive: false});
        brailleGrid.addEventListener('touchmove', handleScan, {passive: false});
        brailleGrid.addEventListener('touchend', endScan);

        // Navigasi Per Huruf
        nextBtn.addEventListener('click', () => {
            if (charIndex < kalimatToRead.length - 1) {
                charIndex++;
                updateReader();
                triggerVibration(40);
            } else {
                triggerVibration([200, 100, 200]); // Getaran pola khusus tanda selesai
                speak("Sudah di ujung kalimat.");
            }
        });

        prevBtn.addEventListener('click', () => {
            if (charIndex > 0) {
                charIndex--;
                updateReader();
                triggerVibration(40);
            } else {
                speak("Awal kalimat.");
            }
        });

        // Tampilkan kalimat awal
        window.onload = () => {
            fullSentenceElem.innerText = kalimatToRead;
            updateReader();
        };
    </script>
</body>
</html>
